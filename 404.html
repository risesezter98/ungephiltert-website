<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seite nicht gefunden — ungephiltert.</title>
  <meta name="robots" content="noindex, follow">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0d0b; color: #f5f1ea; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 40px 24px;
    }
    .logo { font-size: 22px; font-weight: 800; letter-spacing: -.02em; margin-bottom: 48px; }
    .logo span { color: #E8652B; }
    .code { font-size: clamp(72px, 18vw, 140px); font-weight: 800; letter-spacing: -.04em; line-height: 1; color: #E8652B; }
    h1 { font-size: clamp(22px, 4vw, 30px); font-weight: 800; letter-spacing: -.02em; margin: 16px 0 14px; }
    p { font-size: 16px; line-height: 1.7; color: #cfc7bb; max-width: 420px; margin-bottom: 36px; }
    .btn {
      display: inline-block; background: #E8652B; color: #fff;
      padding: 14px 36px; border-radius: 50px; text-decoration: none;
      font-weight: 700; font-size: 15px; transition: transform .2s, box-shadow .2s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(232,101,43,.35); }
  </style>
</head>
<body>
  <div class="logo">ungephiltert<span>.</span></div>
  <div class="code">404</div>
  <h1>Die Seite gibt's nicht.</h1>
  <p>Vielleicht ist der Link alt oder hat sich vertippt. Komm einfach zurück auf die Startseite, da findest du alles.</p>
  <a href="/" class="btn">Zur Startseite</a>
</body>
</html>
